  fetch(DB+'/ff.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(e){console.log('Save err',e);});
}
function load() {
  fetch(DB+'/ff.json').then(function(r){return r.json();}).then(function(d){
    if(!d){render('dash');return;}
    if(d.ingredients&&d.ingredients.length)   ingredients   = d.ingredients;
    if(d.preparations&&d.preparations.length) preparations  = d.preparations;
    if(d.recettes&&d.recettes.length)         recettes      = d.recettes;
    if(d.charges&&d.charges.length)           charges       = d.charges;
    if(d.employes&&d.employes.length)         employes      = d.employes;
    if(d.ventes&&d.ventes.length){ventes=d.ventes;ventes.forEach(function(v){v.date=new Date(v.date);});}
    if(d.fournisseurs&&d.fournisseurs.length) fournisseurs  = d.fournisseurs;
    if(d.historiqueS)                         historiqueS   = d.historiqueS;
    if(d.vRapides)                            vRapides      = d.vRapides;
    render('dash');
  }).catch(function(e){console.log('Load err',e);render('dash');});
}

// ══════ UTILS ══════
var uid = function(){ return Date.now() + Math.random(); };
var fc  = function(v){ return Math.round(v||0).toLocaleString('fr-DZ') + ' DZD'; };
var fp  = function(v){ return (v||0).toFixed(1) + '%'; };

function getSem() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 1);
  var week = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  return now.getFullYear() + '-S' + String(week).padStart(2,'0');
}

function ingPrixUnitaire(ing) {
  if(!ing) return 0;
  // Source: fournisseur
  if(ing.source==='fourn' && ing.fournId) {
    var sem = getSem();
    var achats = (historiqueS[sem]&&historiqueS[sem][ing.fournId]) ? historiqueS[sem][ing.fournId] : [];
    // Filter achats matching this ingredient
    var related = achats.filter(function(a){ return a.ingId && String(a.ingId)===String(ing.id); });
    if(related.length) {
      // Get latest achat price per unit
      var last = related[related.length-1];
      var qte = +last.qte || 1;
      var prix = +last.prix || 0;
      // Convert to prix per ing.unite
      var q = qte;
      if(last.u==='g'  && ing.unite==='kg') q = qte/1000;
      if(last.u==='ml' && ing.unite==='L')  q = qte/1000;
      return q>0 ? prix/q : ing.prix;
    }
  }
  // Source: charge
  if(ing.source==='chg' && ing.chgId) {
    var chg = charges.find(function(c){return String(c.id)===String(ing.chgId);});
    if(chg) return Number(chg.montant);
  }
  // Manual / default
  return ing.prix || 0;
}

function ingPrix(iid, qte, u) {
  var ing = ingredients.find(function(i){return String(i.id)===String(iid);});
  if(!ing) return 0;
  var prixU = ingPrixUnitaire(ing);
  var q = +qte;
  if(u==='g'  && ing.unite==='kg') q = q/1000;
  if(u==='ml' && ing.unite==='L')  q = q/1000;
  return prixU * q;
}

function prepCout(prep) {
  if(!prep||!prep.ings) return 0;
  return prep.ings.reduce(function(s,it){ return s + ingPrix(it.iid, it.qte, it.u); }, 0);
}

function recCout(rec) {
  if(!rec||!rec.ings) return 0;
  return rec.ings.reduce(function(s,it){
    if(it.type==='ing') return s + ingPrix(it.id, it.qte, it.u);
    if(it.type==='prep'){
      var p = preparations.find(function(x){return String(x.id)===String(it.id);});
      if(!p) return s;
      return s + (prepCout(p) / (p.rendement||1)) * it.qte;
    }
    return s;
  }, 0);
}

function empSal(e) {
  var sem = getSem();
  var pl  = e.planning || {};
  var pen = (e.hpen&&e.hpen[sem]) ? e.hpen[sem] : [];
  var acp = (e.hacp&&e.hacp[sem]) ? e.hacp[sem] : [];
  var srv = 0;
  DAYS_E.forEach(function(d){ var s=pl[d]||'repos'; if(s==='matin'||s==='soir')srv+=1; else if(s==='journee')srv+=2; });
  var brut = srv * (e.sal||0);
  var tpen = pen.reduce(function(s,p){return s+Number(p.m||200);},0);
  var tacp = acp.reduce(function(s,a){return s+Number(a.m||0);},0);
  return Math.max(0, brut - tpen - tacp);
}

function fournTotal(fid, sem) {
  return ((historiqueS[sem]&&historiqueS[sem][fid]) ? historiqueS[sem][fid] : []).reduce(function(s,a){return s+Number(a.prix||0);},0);
}
function allFournTotal(sem) {
  return fournisseurs.reduce(function(s,f){return s+fournTotal(f.id,sem);},0);
}

function stats() {
  var ca   = ventes.reduce(function(s,v){return s+v.total;},0);
  var cout = ventes.reduce(function(s,v){return s+v.cout;},0);
  var chg  = charges.reduce(function(s,c){return s+Number(c.montant);},0);
  var sal  = employes.reduce(function(s,e){return s+empSal(e);},0);
  var four = allFournTotal(getSem());
  var pb   = ca - cout;
  var pn   = pb - chg - sal - four;
  var mb   = ca>0?(pb/ca)*100:0;
  var mn   = ca>0?(pn/ca)*100:0;
  return {ca:ca,cout:cout,chg:chg,sal:sal,four:four,pb:pb,pn:pn,mb:mb,mn:mn};
}

var selectedFamille=null, jourActif='Sam';

function rCaisse() {
  var sem = getSem();
  if(!vRapides[sem]) vRapides[sem] = {};
  if(!vRapides[sem][jourActif]) vRapides[sem][jourActif] = {};
  var jourData = vRapides[sem][jourActif];
  var h = '';

  DAYS_F.forEach(function(d){
    var isOn = jourActif===d;
    // Count total for this day
    var dayTotal = 0;

      Object.values(vRapides[sem][d]).forEach(function(v){ dayTotal += v.total||0; });

    if(dayTotal>0) h += '<div style="font-size:9px;color:#22c55e;font-weight:700;margin-top:2px">'+Math.round(dayTotal/1000)+'k</div>';
    h += '</div>';
  });
  h += '</div></div>';

  // ── FAMILLE SELECTOR ──
  h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">';
  CATS.forEach(function(cat){
    var isOn = selectedFamille===cat;
    var catTotal = 0;
    var catQte   = 0;
    recettes.filter(function(r){return r.cat===cat;}).forEach(function(r){
      var v = jourData[r.id]||{};
      catTotal += v.total||0;
      catQte   += v.qte||0;
    });
    h += '<button style="padding:7px 12px;border:none;border-radius:9px;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit;background:'+(isOn?'linear-gradient(135deg,#c94400,#f97316)':'#1c1f24')+';color:'+(isOn?'#fff':'#888')+';border:1px solid '+(isOn?'transparent':'#2a2d33')+'" id="fam_'+cat+'">';
    h += cat+(catTotal>0?' ✓':'');
    h += '</button>';
  });
  h += '</div>';

  // ── TABLEAU RÉSUMÉ DU JOUR ──
  h += '<div class="card" style="margin-bottom:12px">';
  h += '<div style="font-weight:900;margin-bottom:8px;font-size:13px">📋 '+jourActif+' — Résumé</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 50px 100px;gap:4px;margin-bottom:6px">';
  h += '<span style="font-size:10px;color:#555;font-weight:700">FAMILLE</span>';
  h += '<span style="font-size:10px;color:#555;font-weight:700;text-align:center">QTE</span>';
  h += '<span style="font-size:10px;color:#555;font-weight:700;text-align:right">TOTAL</span>';
  h += '</div>';
  var grandTotal=0, grandQte=0;
  CATS.forEach(function(cat){
    var catTotal=0, catQte=0;
    recettes.filter(function(r){return r.cat===cat;}).forEach(function(r){
      var v=jourData[r.id]||{};
      catTotal += v.total||0;
      catQte   += v.qte||0;
    });
    grandTotal += catTotal;
    grandQte   += catQte;
    if(catQte>0||catTotal>0){
      h += '<div style="display:grid;grid-template-columns:1fr 50px 100px;gap:4px;padding:5px 0;border-bottom:1px solid #2a2d33;cursor:pointer" id="famrow_'+cat+'">';
      h += '<span style="font-size:12px;font-weight:700;color:#f97316">'+cat+'</span>';
      h += '<span style="font-size:12px;font-weight:700;text-align:center">'+catQte+'</span>';
      h += '<span style="font-size:12px;font-weight:700;color:#22c55e;text-align:right">'+fc(catTotal)+'</span>';
      h += '</div>';
    }

  h += '<div style="display:grid;grid-template-columns:1fr 50px 100px;gap:4px;padding:8px 0;margin-top:2px">';
  h += '<span style="font-size:13px;font-weight:900">TOTAL JOUR</span>';
  h += '<span style="font-size:13px;font-weight:900;color:#f97316;text-align:center">'+grandQte+'</span>';
  h += '<span style="font-size:13px;font-weight:900;color:#22c55e;text-align:right">'+fc(grandTotal)+'</span>';
  h += '</div></div>';

  // ── ARTICLES DE LA FAMILLE ──
  if(selectedFamille) {
    var famProds = recettes.filter(function(r){return r.cat===selectedFamille;});

    h += '<div style="font-weight:900;margin-bottom:10px;font-size:13px;color:#f97316">'+selectedFamille+' — '+jourActif+'</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 65px 95px;gap:6px;margin-bottom:6px">';
    h += '<span style="font-size:10px;color:#555;font-weight:700">PRODUIT</span>';
    h += '<span style="font-size:10px;color:#555;font-weight:700;text-align:center">QTE</span>';
    h += '<span style="font-size:10px;color:#555;font-weight:700;text-align:right">TOTAL DZD</span>';
    h += '</div>';
    famProds.forEach(function(r){
      var vr = jourData[r.id]||{qte:0,total:0};
      h += '<div style="display:grid;grid-template-columns:1fr 65px 95px;gap:6px;padding:5px 0;border-bottom:1px solid #2a2d33;align-items:center">';
      h += '<span style="font-size:12px;font-weight:600">'+r.nom+'</span>';
      h += '<input type="number" placeholder="0" value="'+(vr.qte||'')+'" style="background:#111418;border:1px solid #2a2d33;border-radius:7px;padding:6px 4px;color:#f97316;font-size:13px;font-weight:800;text-align:center;font-family:inherit;width:100%" id="vqte_'+r.id+'"/>';
      h += '<input type="number" placeholder="0" value="'+(vr.total||'')+'" style="background:#111418;border:1px solid #2a2d33;border-radius:7px;padding:6px 4px;color:#22c55e;font-size:12px;font-weight:800;text-align:right;font-family:inherit;width:100%" id="vtot_'+r.id+'"/>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ── TOTAL SEMAINE ──
  h += '<div class="card" style="background:linear-gradient(135deg,#1a1a2e,#1c1f24);border-color:#a78bfa40;margin-bottom:12px">';
  h += '<div style="font-weight:900;margin-bottom:10px;font-size:13px;color:#a78bfa">📊 Total Semaine — '+sem+'</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 50px 100px;gap:4px;margin-bottom:6px">';
  h += '<span style="font-size:10px;color:#555;font-weight:700">FAMILLE</span>';
  h += '<span style="font-size:10px;color:#555;font-weight:700;text-align:center">QTE</span>';
  h += '<span style="font-size:10px;color:#555;font-weight:700;text-align:right">TOTAL</span>';
  h += '</div>';
  var semTotal=0, semQte=0;
  CATS.forEach(function(cat){
    var catT=0, catQ=0;
    DAYS_F.forEach(function(d){
      var dd = (vRapides[sem]&&vRapides[sem][d])?vRapides[sem][d]:{};
      recettes.filter(function(r){return r.cat===cat;}).forEach(function(r){
        var v=dd[r.id]||{};
        catT += v.total||0;
        catQ += v.qte||0;
      });
    });
    semTotal += catT;
    semQte   += catQ;
    if(catQ>0||catT>0){
      h += '<div style="display:grid;grid-template-columns:1fr 50px 100px;gap:4px;padding:5px 0;border-bottom:1px solid #2a2d33">';
      h += '<span style="font-size:12px;font-weight:700;color:#a78bfa">'+cat+'</span>';
      h += '<span style="font-size:12px;font-weight:700;text-align:center">'+catQ+'</span>';
      h += '<span style="font-size:12px;font-weight:700;color:#22c55e;text-align:right">'+fc(catT)+'</span>';
      h += '</div>';
    }
  });
  h += '<div style="display:grid;grid-template-columns:1fr 50px 100px;gap:4px;padding:8px 0;margin-top:2px">';
  h += '<span style="font-size:14px;font-weight:900">TOTAL SEMAINE</span>';
  h += '<span style="font-size:14px;font-weight:900;color:#f97316;text-align:center">'+semQte+'</span>';
  h += '<span style="font-size:14px;font-weight:900;color:#22c55e;text-align:right">'+fc(semTotal)+'</span>';
  h += '</div></div>';

  // ── VALIDER JOUR ──
  if(grandTotal>0) {
    h += '<button class="btn bo" style="width:100%;padding:14px;font-size:14px" id="valjour">✅ Enregistrer '+jourActif+' — '+fc(grandTotal)+'</button>';
  }

  document.getElementById('caisse').innerHTML = h;

  // Events - jours
  DAYS_F.forEach(function(d){
    var jb = document.getElementById('jbtn_'+d);
    if(jb) jb.onclick = function(){ jourActif=d; selectedFamille=null; rCaisse(); };
  });
  // Events - familles
  CATS.forEach(function(cat){
    var fb = document.getElementById('fam_'+cat);
    var fr = document.getElementById('famrow_'+cat);
    var handler = function(){ selectedFamille=selectedFamille===cat?null:cat; rCaisse(); };
    if(fb) fb.onclick = handler;
    if(fr) fr.onclick = handler;
  });
  // Events - inputs
  if(selectedFamille){
    recettes.filter(function(r){return r.cat===selectedFamille;}).forEach(function(r){
      var qi = document.getElementById('vqte_'+r.id);
      var ti = document.getElementById('vtot_'+r.id);
      var upd = function(){
        var q = qi?+(qi.value)||0:0;
        var t = ti?+(ti.value)||0:0;
        if(q>0||t>0){ if(!vRapides[sem][jourActif])vRapides[sem][jourActif]={}; vRapides[sem][jourActif][r.id]={qte:q,total:t}; }
        else { if(vRapides[sem]&&vRapides[sem][jourActif]) delete vRapides[sem][jourActif][r.id]; }
        save();
      };
      if(qi) qi.oninput = upd;
      if(ti) ti.oninput = upd;
    });
  }
  // Valider jour
  var vj = document.getElementById('valjour');
  if(vj) vj.onclick = function(){
    var items=[], total=0, cout=0;
    CATS.forEach(function(cat){
      recettes.filter(function(r){return r.cat===cat;}).forEach(function(r){
        var v=jourData[r.id]||{};
        if(!v.qte&&!v.total) return;
        items.push({nom:r.nom,qte:v.qte||0,prix:v.qte>0?Math.round(v.total/v.qte):0});
        total += v.total||0;
        cout  += recCout(r)*(v.qte||0);
      });
    });
    if(!items.length) return;
    ventes.unshift({id:uid(),items:items,total:total,cout:cout,date:new Date(),jour:jourActif,sem:sem});
    // Clear this day data
    if(vRapides[sem]) delete vRapides[sem][jourActif];
    save(); rCaisse();
  };
}

function addCart(id){
  var r = recettes.find(function(x){return String(x.id)===String(id);});
  if(!r) return;
  var ex = panier.find(function(x){return String(x.id)===String(id);});
  if(ex) ex.qte++; else panier.push({id:r.id,nom:r.nom,prix:r.prix,cat:r.cat,qte:1});
  rCaisse();
}
function remCart(id){
  var ex = panier.find(function(x){return String(x.id)===String(id);});
  if(!ex) return;
  if(ex.qte===1) panier = panier.filter(function(x){return String(x.id)!==String(id);});
  else ex.qte--;
  rCaisse();
}
function valider(){
  if(!panier.length) return;
  var tot  = panier.reduce(function(s,x){return s+x.prix*x.qte;},0);
  var cout = panier.reduce(function(s,x){
    var r = recettes.find(function(rr){return String(rr.id)===String(x.id);});
    return s + (r?recCout(r):0)*x.qte;
  },0);
  ventes.unshift({id:uid(),items:panier.map(function(x){return {nom:x.nom,qte:x.qte,prix:x.prix};}),total:tot,cout:cout,date:new Date()});
  panier = [];
  save();
  rCaisse();
}

      ],function(d){
        ing.nom   = d.nom;
        ing.prix  = +d.prix;
        ing.unite = d.unite;
        if(d.src==='manuel'){ ing.source=null; ing.fournId=null; ing.chgId=null; }
        else if(d.src.startsWith('fourn_')){ ing.source='fourn'; ing.fournId=+d.src.split('_')[1]; ing.chgId=null; }
        else if(d.src.startsWith('chg_')){ ing.source='chg'; ing.chgId=+d.src.split('_')[1]; ing.fournId=null; }
        save(); rIng();
      });
    };
    if(db) db.onclick = function(){ ingredients=ingredients.filter(function(i){return String(i.id)!==String(ing.id);}); save(); rIng(); };
  });
}

function cycleS(eid,d){
  var e=employes.find(function(x){return String(x.id)===String(eid);});
  if(!e) return;
  if(!e.planning) e.planning={};
  var cur=e.planning[d]||'repos';
  e.planning[d]=cur==='repos'?'matin':cur==='matin'?'soir':cur==='soir'?'journee':'repos';
  save();rEmp();
}
function addPen(eid,type){
  var e=employes.find(function(x){return String(x.id)===String(eid);});
  if(!e) return;
  var sem=semEmp();
  if(!e.hpen) e.hpen={};
  if(!e.hpen[sem]) e.hpen[sem]=[];
  e.hpen[sem].push({id:uid(),type:type,m:200,date:new Date().toLocaleDateString('fr-FR')});
  save();rEmp();
}
function delPen(eid,pid){
  var e=employes.find(function(x){return String(x.id)===String(eid);});
  if(!e) return;
  var sem=semEmp();
  if(e.hpen&&e.hpen[sem]) e.hpen[sem]=e.hpen[sem].filter(function(p){return String(p.id)!==String(pid);});
  save();rEmp();
}
function addAcp(eid,montant){
  var e=employes.find(function(x){return String(x.id)===String(eid);});
  if(!e||!montant) return;
  var sem=semEmp();
  if(!e.hacp) e.hacp={};
  if(!e.hacp[sem]) e.hacp[sem]=[];
  e.hacp[sem].push({id:uid(),m:+montant,date:new Date().toLocaleDateString('fr-FR')});
  save();rEmp();
}
function delAcp(eid,aid){
  var e=employes.find(function(x){return String(x.id)===String(eid);});
  if(!e) return;
  var sem=semEmp();
  if(e.hacp&&e.hacp[sem]) e.hacp[sem]=e.hacp[sem].filter(function(a){return String(a.id)!==String(aid);});
  save();rEmp();
}

      h+='<span style="color:#22c55e;font-weight:900;font-size:12px">'+fc(empSal(e))+'</span></div>';
    });
    h+='<div class="row" style="padding-top:10px;font-weight:900"><span>Total</span><span style="color:#ef4444;font-size:15px">'+fc(s.sal)+'</span></div>';
    h+='</div>';
  }
  document.getElementById('rapp').innerHTML=h;
}

// ══════ INIT ══════
load();
</script>
