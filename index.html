function sauvegarder() {
  const data = {ingredients,preparations,recettes,charges,employes,ventes,fournisseurs,historiqueSemaines};
  fetch(DB_URL+'/fastfood.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .catch(e=>console.log('Save error:',e));
}

function chargerDonnees() {

  document.getElementById('page-dashboard').innerHTML = '<div style="text-align:center;padding:60px;color:#555"><div style="font-size:40px">⏳</div><div style="margin-top:12px;font-size:14px">Chargement...</div></div>';
  
  fetch(DB_URL+'/fastfood.json', {
    method: 'GET',
    headers: {'Accept': 'application/json'},
    mode: 'cors'
  })
    .then(r=>{
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(data=>{
      if(data && typeof data === 'object') {
        if(data.ingredients && data.ingredients.length)        ingredients        = data.ingredients;
        if(data.preparations && data.preparations.length)      preparations       = data.preparations;
        if(data.recettes && data.recettes.length)              recettes           = data.recettes;
        if(data.charges && data.charges.length)                charges            = data.charges;
        if(data.employes && data.employes.length)              employes           = data.employes;
        if(data.ventes && data.ventes.length)                  {ventes=data.ventes;ventes.forEach(v=>v.date=new Date(v.date));}
        if(data.fournisseurs && data.fournisseurs.length)      fournisseurs       = data.fournisseurs;
        if(data.historiqueSemaines)                            historiqueSemaines = data.historiqueSemaines;
      }
      renderDashboard();
    })
    .catch(e=>{
      console.log('Load error:',e);
      // Continue with default data even if Firebase fails
      renderDashboard();
    });
}

// Calcul coût d'une recette
function coutRecette(r) {
  if(!r.ingredients||!r.ingredients.length) return 0;
  return r.ingredients.reduce((total,item)=>{
    if(item.type==='ing'){
      const ing = ingredients.find(i=>i.id===item.id);
      if(!ing) return total;
      // Convertir en unité de base
      let qteBase = item.qte;
      if(item.unite==='g' && ing.unite==='kg') qteBase = item.qte/1000;
      else if(item.unite==='ml' && ing.unite==='L') qteBase = item.qte/1000;
      return total + (ing.prix * qteBase);
    } else if(item.type==='prep'){
      const prep = preparations.find(p=>p.id===item.id);
      if(!prep) return total;
      const coutTotal = coutPreparation(prep);
      const coutParPortion = coutTotal / (prep.rendement||1);
      return total + (coutParPortion * item.qte);
    }
    return total;
  },0);
}

// Calcul coût d'une préparation
function coutPreparation(prep) {
  if(!prep.ingredients||!prep.ingredients.length) return 0;
  return prep.ingredients.reduce((total,item)=>{
    const ing = ingredients.find(i=>i.id===item.id);
    if(!ing) return total;
    let qteBase = item.qte;
    if(item.unite==='g' && ing.unite==='kg') qteBase = item.qte/1000;
    else if(item.unite==='ml' && ing.unite==='L') qteBase = item.qte/1000;
    return total + (ing.prix * qteBase);
  },0);
}

  const totalCA    = ventes.reduce((s,v)=>s+v.total,0);
  const totalCout  = ventes.reduce((s,v)=>s+v.cout,0);
  const totalChg   = charges.reduce((s,c)=>s+Number(c.montant),0);
  const masseSal   = employes.reduce((s,e)=>s+salaireEmp(e),0);
  const totalFourn = totalTousFourn(getCurrentSemaine());
  const profitBrut = totalCA - totalCout;
  const profitNet  = profitBrut - totalChg - masseSal - totalFourn;
  const margeBrute = totalCA>0?(profitBrut/totalCA)*100:0;
  const margeNette = totalCA>0?(profitNet/totalCA)*100:0;
  return {totalCA,totalCout,totalChg,masseSal,totalFourn,profitBrut,profitNet,margeBrute,margeNette};
}

function salaireEmp(e) {
  const planning=e.planning||{};
  const penalites=e.penalites||[];
  const acomptes=e.acomptes||[];
  let srv=0;
  DAYS_EMP.forEach(d=>{const s=planning[d]||'repos';if(s==='matin'||s==='soir')srv+=1;else if(s==='journee')srv+=2;});
  const brut=srv*Number(e.salaireService||0);
  const pen=penalites.reduce((s,p)=>s+Number(p.montant||200),0);
  const acp=acomptes.reduce((s,a)=>s+Number(a.montant||0),0);
  return Math.max(0,brut-pen-acp);
}

function getCurrentSemaine() {
  const now=new Date();
  // Week starts Saturday (day 6)
  const day=now.getDay(); // 0=Sun, 6=Sat
  const diff=now.getDate() - day + (day===6?0:-1) - (day===0?6:day-6);
  const weekStart=new Date(now.setDate(diff));
  const start=new Date(weekStart.getFullYear(),0,1);
  const week=Math.ceil(((weekStart-start)/86400000+start.getDay()+1)/7);
  return weekStart.getFullYear()+'-S'+String(week).padStart(2,'0');
}
function getSemaines(){const t=Object.keys(historiqueSemaines).sort().reverse();if(!t.includes(semaineActive))t.unshift(semaineActive);return t;}
function getAchats(fId,sem){return (historiqueSemaines[sem]&&historiqueSemaines[sem][fId])||[];}
function totalFournisseur(fId,sem){return getAchats(fId,sem).reduce((s,a)=>s+Number(a.prix),0);}
function totalTousFourn(sem){return fournisseurs.reduce((s,f)=>s+totalFournisseur(f.id,sem),0);}

let semaineActive=getCurrentSemaine();

}

}
function remFromCart(id){
  const ex=panier.find(x=>x.id===id);if(!ex)return;
  if(ex.qte===1)panier=panier.filter(x=>x.id!==id);else ex.qte--;
  renderCaisse();
}
function validerVente(){
  if(!panier.length)return;
  const total=panier.reduce((s,x)=>s+x.prix*x.qte,0);
  const cout=panier.reduce((s,x)=>s+coutRecette(x)*x.qte,0);
  ventes.unshift({id:uid(),items:panier.map(x=>({nom:x.nom,qte:x.qte,prix:x.prix})),total,cout,date:new Date()});
  panier=[];sauvegarder();renderCaisse();
}

function addRec(){
  if(!newRec.nom||!newRec.prix)return;
  recettes.push({id:uid(),nom:newRec.nom,cat:newRec.cat,prix:+newRec.prix,ingredients:[]});
  newRec={nom:'',cat:'Burger',prix:''};showAddRec=false;sauvegarder();renderRecettes();
}
function delRecette(btn){var id=btn.getAttribute('data-id');delRec(id);}
function editRecette(btn){var id=+btn.getAttribute('data-id');editRec(id);}
function delRec(id){
  recettes=recettes.filter(r=>String(r.id)!==String(id));
  expandedRec=null;
  sauvegarder();
  renderRecettes();
}
function editRec(id){
  const r=recettes.find(x=>String(x.id)===String(id));
  openModal('✏️ Modifier recette',[
    {k:'nom',  l:'Nom',              t:'text',   v:r.nom},
    {k:'prix', l:'Prix vente (DZD)', t:'number', v:r.prix},
    {k:'cat',  l:'Catégorie',        t:'select', v:r.cat, opts:CATS.map(c=>({v:c,l:c}))},
  ],data=>{Object.assign(r,{nom:data.nom,prix:+data.prix,cat:data.cat});sauvegarder();renderRecettes();});
}
function addIngToRec(recId){
  const rec=recettes.find(r=>String(r.id)===String(recId));if(!rec)return;
  const val=document.getElementById('rec_ing_'+recId).value;
  const id=+val.split('_')[1];
  const qte=+document.getElementById('rec_qte_'+recId).value;
  const unite=document.getElementById('rec_unite_'+recId).value;
  if(!qte)return;
  if(!rec.ingredients)rec.ingredients=[];
  rec.ingredients.push({type:'ing',id,qte,unite});
  sauvegarder();renderRecettes();
}
function addPrepToRec(recId){
  const rec=recettes.find(r=>String(r.id)===String(recId));if(!rec)return;
  const id=+document.getElementById('rec_prep_'+recId).value;
  const qte=+document.getElementById('rec_prep_qte_'+recId).value||1;
  if(!rec.ingredients)rec.ingredients=[];
  rec.ingredients.push({type:'prep',id,qte,unite:'portion'});
  sauvegarder();renderRecettes();
}
function delIngRec(recId,type,ingId){
  const rec=recettes.find(r=>String(r.id)===String(recId));if(!rec)return;
  rec.ingredients=rec.ingredients.filter(i=>!(i.type===type&&i.id===ingId));
  sauvegarder();renderRecettes();
}

    <div class="row">
      <div><div style="font-size:10px;color:#555;font-weight:700;letter-spacing:1px">SEMAINE</div><div style="font-size:16px;font-weight:900;color:#a78bfa;margin-top:4px">${semaineActive}</div></div>
      <div style="text-align:right"><div style="font-size:18px;font-weight:900;color:#ef4444">${fc(totalSem)}</div><div style="font-size:10px;color:#555">total achats</div>${diff!==null?`<div style="font-size:10px;font-weight:700;color:${diff>0?'#ef4444':'#22c55e'}">${diff>0?'▲':'▼'} ${fc(Math.abs(diff))}</div>`:''}</div>
    </div>
    ${semaines.length>1?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${semaines.map(s=>`<button onclick="semaineActive='${s}';renderFournisseurs()" style="background:${s===semaineActive?'#a78bfa':'#2a2d33'};color:${s===semaineActive?'#fff':'#888'};border:none;border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit">${s}</button>`).join('')}</div>`:''}
  </div>`;
  fournisseurs.forEach(f=>{
    const achats=getAchats(f.id,semaineActive),total=totalFournisseur(f.id,semaineActive);
    const isOpen=expandedFourn===f.id;
    h+=`<div class="card" style="margin-bottom:8px;padding:0;overflow:hidden">
      <div class="acc-header" onclick="expandedFourn=expandedFourn===${f.id}?null:${f.id};renderFournisseurs()">
        <div><div style="font-weight:900;font-size:14px">🚚 ${f.nom}</div><div style="font-size:11px;color:#555;margin-top:2px">${achats.length} achat${achats.length>1?'s':''}</div></div>
        <div style="text-align:right"><div style="color:#ef4444;font-weight:900;font-size:15px">${fc(total)}</div><div style="color:#555">${isOpen?'▲':'▼'}</div></div>
      </div>
      ${isOpen?`<div class="acc-body">
        ${DAYS.map(d=>{const lignes=achats.filter(a=>a.jour===d);return `<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#a78bfa;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">${d}</div>
          ${lignes.length===0?'<div style="font-size:11px;color:#333">—</div>':''}
          ${lignes.map(a=>`<div style="background:#111418;border-radius:7px;padding:7px 10px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:12px;font-weight:700">${a.produit}</span><span style="font-size:10px;color:#555;margin-left:6px">${a.qte} ${a.unite}</span></div><div style="display:flex;align-items:center;gap:6px"><span style="color:#ef4444;font-weight:800;font-size:11px">${fc(a.prix)}</span>${semaineActive===curSem?`<button onclick="delAchat(${f.id},${a.id})" style="background:none;border:none;color:#555;cursor:pointer;font-size:15px">×</button>`:''}</div></div>`).join('')}
        </div>`;}).join('')}
        ${semaineActive===curSem?`<button class="btn-edit" onclick="openAddAchat(${f.id})">+ Ajouter achat</button>`:''}
        <button class="btn-del" style="margin-left:8px" onclick="delFourn(${f.id})">🗑 Supprimer</button>
      </div>`:''}
    </div>`;
  });
  if(showAddFourn){
    h+=`<div class="card" style="border-color:#a78bfa40;margin-bottom:10px">
      <div style="font-weight:900;margin-bottom:10px">Nouveau fournisseur</div>
      <input class="inp" placeholder="Nom (ex: Poulet, Légumes…)" value="${newFourn.nom}" oninput="newFourn.nom=this.value"/>
      <div style="display:flex;gap:8px">
        <button class="btn" style="background:#a78bfa" onclick="addFourn()">Ajouter</button>
        <button class="btn btn-gray" onclick="showAddFourn=false;renderFournisseurs()">Annuler</button>
      </div>
    </div>`;
  }
  h+=`<button class="btn-outline" style="border-color:#a78bfa;color:#a78bfa" onclick="showAddFourn=true;renderFournisseurs()">+ Ajouter un fournisseur</button>`;
  document.getElementById('page-fournisseurs').innerHTML=h;
}
function openAddAchat(fId){
  fournModalId=fId;
  openModal('+ Ajouter achat',[
    {k:'jour',    l:'Jour',      t:'select',  v:'Lun',opts:DAYS.map(d=>({v:d,l:d}))},
    {k:'produit', l:'Produit',   t:'text',    v:''},
    {k:'qte',     l:'Quantité',  t:'number',  v:''},
    {k:'unite',   l:'Unité',     t:'select',  v:'kg',opts:UNITE_OPTIONS},
    {k:'prix',    l:'Prix total (DZD)',t:'number',v:''},
  ],data=>{
    if(!data.produit||!data.prix)return;
    if(!historiqueSemaines[semaineActive])historiqueSemaines[semaineActive]={};
    if(!historiqueSemaines[semaineActive][fournModalId])historiqueSemaines[semaineActive][fournModalId]=[];
    historiqueSemaines[semaineActive][fournModalId].push({id:uid(),jour:data.jour,produit:data.produit,qte:data.qte,unite:data.unite,prix:+data.prix});
    sauvegarder();renderFournisseurs();
  },'#a78bfa');
}
function addFourn(){if(!newFourn.nom)return;fournisseurs.push({id:uid(),nom:newFourn.nom});newFourn={nom:''};showAddFourn=false;sauvegarder();renderFournisseurs();}
function delFourn(id){fournisseurs=fournisseurs.filter(f=>String(f.id)!==String(id));sauvegarder();renderFournisseurs();}
function delAchat(fId,aId){if(!historiqueSemaines[semaineActive]||!historiqueSemaines[semaineActive][fId])return;historiqueSemaines[semaineActive][fId]=historiqueSemaines[semaineActive][fId].filter(a=>a.id!==aId);sauvegarder();renderFournisseurs();}

// ══════════════════════════════════════════
// RAPPORT
// ══════════════════════════════════════════
function renderRapport(){
  const s=calcStats();
  const fixes=charges.filter(c=>c.type==='fixe').reduce((a,c)=>a+Number(c.montant),0);
  const vars=charges.filter(c=>c.type==='variable').reduce((a,c)=>a+Number(c.montant),0);
  let h=`<div style="background:linear-gradient(135deg,#c94400,#f97316);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center">
    <div style="font-size:11px;opacity:0.85;font-weight:700;letter-spacing:1px">PROFIT NET</div>
    <div style="font-size:36px;font-weight:900;margin-top:4px">${fc(s.profitNet)}</div>
    <div style="font-size:12px;opacity:0.8;margin-top:4px">Marge nette: ${fp(s.margeNette)}</div>
  </div>
  <div class="card">
    <div style="font-weight:900;margin-bottom:10px;font-size:13px">💰 Compte de Résultat</div>
    ${[
      {l:"Chiffre d'affaires", v:s.totalCA,   c:"#f97316",ico:"➕"},
      {l:"Coût ingrédients",   v:s.totalCout, c:"#ef4444", ico:"➖"},
      {l:"PROFIT BRUT",        v:s.profitBrut,c:"#22c55e", ico:"═",b:true},
      {l:"Charges fixes",      v:fixes,        c:"#ef4444", ico:"➖"},
      {l:"Charges variables",  v:vars,         c:"#ef4444", ico:"➖"},
      {l:"Masse salariale",    v:s.masseSal,  c:"#ef4444", ico:"➖"},
      {l:"Achats fournisseurs",v:s.totalFourn,c:"#ef4444", ico:"➖"},
      {l:"PROFIT NET",         v:s.profitNet, c:s.profitNet>=0?'#22c55e':'#ef4444',ico:"═",b:true},
    ].map(r=>`<div class="fin-row" style="font-weight:${r.b?900:500}">
      <span style="color:#aaa;font-size:12px">${r.ico} ${r.l}</span>
      <span style="color:${r.c};font-size:12px;font-weight:${r.b?900:600}">${fc(Math.abs(r.v))}</span>
    </div>`).join('')}
  </div>
  <div class="grid2">
    <div class="card"><div style="font-size:10px;color:#555;font-weight:700">Nb ventes</div><div style="font-size:20px;font-weight:900;color:#a78bfa;margin-top:4px">${ventes.length}</div></div>
    <div class="card"><div style="font-size:10px;color:#555;font-weight:700">Panier moyen</div><div style="font-size:16px;font-weight:900;color:#60a5fa;margin-top:4px">${fc(s.totalCA/(ventes.length||1))}</div></div>
    <div class="card"><div style="font-size:10px;color:#555;font-weight:700">Marge brute</div><div style="font-size:20px;font-weight:900;color:#22c55e;margin-top:4px">${fp(s.margeBrute)}</div></div>
    <div class="card"><div style="font-size:10px;color:#555;font-weight:700">Marge nette</div><div style="font-size:20px;font-weight:900;color:${s.margeNette>=0?'#22c55e':'#ef4444'};margin-top:4px">${fp(s.margeNette)}</div></div>
  </div>`;
  if(employes.length>0){
    h+=`<div class="card"><div style="font-weight:900;margin-bottom:10px;font-size:13px">👥 Salaires semaine</div>`;
    employes.forEach(e=>{
      let srv=0;DAYS_EMP.forEach(d=>{const s=(e.planning||{})[d]||'repos';if(s==='matin'||s==='soir')srv+=1;else if(s==='journee')srv+=2;});
      const acp=(e.acomptes||[]).reduce((s,a)=>s+Number(a.montant||0),0);
      h+=`<div class="fin-row"><div><div style="font-weight:700;font-size:12px">${e.nom}</div><div style="font-size:10px;color:#555">${e.poste} — ${srv} services${acp>0?' 💵 Acompte: '+fc(acp):''}</div></div><span style="color:#22c55e;font-weight:900;font-size:12px">${fc(salaireEmp(e))}</span></div>`;
    });
    h+=`<div class="row" style="padding-top:10px;font-weight:900"><span>Total</span><span style="color:#ef4444;font-size:15px">${fc(s.masseSal)}</span></div></div>`;
  }
  if(recettes.length>0){
    h+=`<div class="card"><div style="font-weight:900;margin-bottom:10px;font-size:13px">🍔 Coûts par recette</div>`;
    recettes.forEach(r=>{
      const cout=coutRecette(r);const marge=r.prix>0?((r.prix-cout)/r.prix)*100:0;
      h+=`<div class="fin-row"><div><div style="font-size:12px;font-weight:700">${r.nom}</div><div style="font-size:10px;color:#555">${r.cat}</div></div><div style="text-align:right"><div style="color:#f97316;font-size:12px;font-weight:700">${fc(r.prix)}</div><div style="font-size:10px;color:${marge>50?'#22c55e':marge>30?'#f59e0b':'#ef4444'}">Marge: ${fp(marge)}</div></div></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('page-rapport').innerHTML=h;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
chargerDonnees();
</script>
